<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in the Void — Immaculate Vibes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            color: #e0e0e8;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .void {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
        }
        
        .void-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            animation: drift 15s ease-in-out infinite;
        }
        
        .orb-1 {
            width: 400px; height: 400px;
            top: 20%; left: 30%;
            background: #8b5cf6;
            animation-delay: 0s;
        }
        
        .orb-2 {
            width: 300px; height: 300px;
            bottom: 20%; right: 25%;
            background: #3b82f6;
            animation-delay: -5s;
        }
        
        .orb-3 {
            width: 200px; height: 200px;
            top: 50%; left: 60%;
            background: #6366f1;
            animation-delay: -10s;
        }
        
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(40px, 30px) scale(1.05); }
        }
        
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        
        .glitch-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6, #8b5cf6);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease infinite;
            margin-bottom: 1rem;
            position: relative;
        }
        
        .glitch-code::after {
            content: '404';
            position: absolute;
            top: 2px; left: 2px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.3;
            z-index: -1;
        }
        
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #e0e0e8;
            margin-bottom: 0.8rem;
        }
        
        .message {
            font-size: 0.95rem;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.8rem;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            color: #c4b5fd;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .home-btn:hover {
            background: rgba(139, 92, 246, 0.25);
            border-color: rgba(139, 92, 246, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.15);
        }
        
        .easter {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #374151;
            font-style: italic;
        }
        
        @media (max-width: 480px) {
            .glitch-code { font-size: 5rem; }
            .title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="void">
        <div class="void-orb orb-1"></div>
        <div class="void-orb orb-2"></div>
        <div class="void-orb orb-3"></div>
    </div>
    
    <div class="content">
        <div class="glitch-code">404</div>
        <h1 class="title">Lost in the void</h1>
        <p class="message">
            This piece doesn't exist yet — or maybe it drifted into another dimension. 
            The gallery is still here though.
        </p>
        <a href="/" class="home-btn">✨ Back to the gallery</a>
        <p class="easter">even AI art has its missing canvases</p>
    </div>
</body>
</html>
